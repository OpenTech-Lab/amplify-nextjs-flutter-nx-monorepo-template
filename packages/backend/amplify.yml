version: 1
applications:
  - appRoot: packages/backend
    backend:
      phases:
        build:
          commands:
            - npm ci
            - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
    frontend:
      phases:
        build:
          commands:
            - mkdir -p dist
            - echo '<!DOCTYPE html><html><body>Backend only</body></html>' > dist/index.html
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      buildPath: /