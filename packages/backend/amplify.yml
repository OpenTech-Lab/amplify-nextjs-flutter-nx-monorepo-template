version: 1
applications:
  - appRoot: packages/backend
    backend:
      phases:
        preBuild:
          commands:
            - cd ../.. && npm ci --prefer-offline --cache .npm   # Install Nx root deps
            - cd packages/backend
        build:
          commands:
            - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
    # NO frontend section → backend-only mode (no bundling/artifacts)