version: 1
applications:
  - appRoot: packages/backend
    backend:
      phases:
        preBuild:
          commands:
            - cd ../.. && npm ci --prefer-offline --cache .npm
            - cd packages/backend
            - npm install --prefer-offline --cache .npm
        build:
          commands:
            - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
    frontend:
      artifacts:
        baseDirectory: ./
        files:
          - 'package.json'
      cache:
        paths: []