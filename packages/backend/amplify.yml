version: 1
backend:
  phases:
    build:
      commands:
        - cd ../.. && npm ci --prefer-offline --cache .npm   # Install from root (Nx workspace)
        - cd packages/backend
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    build:
      commands:
        - echo "Backend-only app - no frontend build required"
        - mkdir -p dist && touch dist/index.html   # Dummy artifact (Hosting requires something)
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .npm/**/*
      - .nx/cache/**/*