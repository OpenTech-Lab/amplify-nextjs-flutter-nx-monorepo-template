version: 1
applications:
  - appRoot: packages/backend
    backend:
      phases:
        preBuild:
          commands:
            - npm ci
            - npx ampx --version  # verify it's available
        build:
          commands:
            - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
    frontend:
      phases:
        build:
          commands:
            - echo "No frontend"
      artifacts:
        baseDirectory: .
        files:
          - '**/*'