version: 1
backend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline   # Install deps from root if needed
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    build:
      commands:
        - echo "No frontend build needed for backend-only app"
        - mkdir -p dist && touch dist/index.html   # Dummy artifact to satisfy Hosting
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .npm/**/*